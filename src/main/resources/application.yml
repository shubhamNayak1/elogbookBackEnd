server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  forward-headers-strategy: framework

spring:
  application:
    name: pharmatrack-elogbook
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pharmatrack}
    username: ${DB_USER:pharmatrack}
    password: ${DB_PASSWORD:pharmatrack}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

app:
  jwt:
    secret: ${JWT_SECRET:replace-me-with-a-32+byte-base64-secret-replace-me-with-a-32+byte-base64-secret}
    expiration-minutes: ${JWT_EXP_MINUTES:480}
  cors:
    # Comma-separated. Patterns supported (e.g. https://*.baserastech.com).
    # Override at runtime via the CORS_ORIGINS env var.
    allowed-origins: ${CORS_ORIGINS:https://logbook.baserastech.com,https://*.baserastech.com,http://localhost:5173,http://localhost:3000}
  audit:
    range-max-days: 31

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO
    com.pharmatrack: DEBUG
